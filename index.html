<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Kitchen | Devi Sri Delights</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#7E2CD4">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Playfair+Display:wght@700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="login-screen">
        <h2 class="classy-title">👨‍🍳 Kitchen Access</h2>
        <input type="email" id="email-input" class="styled-input" placeholder="Admin Email">
        <input type="password" id="password-input" class="styled-input" placeholder="Password">
        <button class="action-btn" onclick="attemptLogin()" style="margin-top: 20px;">Log In</button>
        <div id="error-msg"></div>
    </div>

    <div id="dashboard-screen">
        
        <div class="dashboard-header">
            <div class="header-titles">
                <h1 class="classy-title" style="color: white; font-size: 1.8rem;">👨‍🍳 Kitchen Dashboard</h1>
                <p style="color: #E9D5FF; font-weight: 600; margin: 5px 0 0 0;">Live Orders for Devi Sri Delights</p>
            </div>
            <button class="logout-btn" onclick="attemptLogout()">Logout</button>
        </div>

        <div class="stats-bar">
            <div class="stat-box">
                <div class="stat-title">📈 Today's Orders</div>
                <div class="stat-value" id="today-count">0</div>
            </div>
            <div class="stat-box" style="border-left-color: #10B981;">
                <div class="stat-title">💰 Today's Earned</div>
                <div class="stat-value" id="today-earnings" style="color: #10B981;">₹0</div>
            </div>
        </div>

        <div class="tabs-container">
            <button class="tab-btn active" data-tab="pending">New Orders</button>
            <button class="tab-btn" data-tab="ready">Ready (Notify)</button>
            <button class="tab-btn" data-tab="completed">Picked Up</button>
            <button class="tab-btn" data-tab="summary">Today's Item Summary</button>
        </div>

        <div class="search-container" id="search-wrapper">
            <input type="text" id="search-bar" class="styled-input" placeholder="🔍 Search by customer name...">
        </div>

        <div id="pending-tab" class="tab-panel active">
            <div class="orders-grid" id="pending-container"></div>
        </div>
        
        <div id="ready-tab" class="tab-panel">
            <div class="orders-grid" id="ready-container"></div>
        </div>

        <div id="completed-tab" class="tab-panel">
            <div class="orders-grid" id="completed-container"></div>
        </div>

        <div id="summary-tab" class="tab-panel">
            <div class="summary-grid" id="item-summary-container"></div>
        </div>

    </div>

    <div class="floating-app-bar">
        <button id="share-float" class="float-btn">🔗 Share Dashboard</button>
        <button id="download-float" class="float-btn" style="background: var(--btn-primary);">📱 Install App</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
        import { getFirestore, collection, query, orderBy, onSnapshot, doc, updateDoc } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js"; 

        // --- 1. FIREBASE CONFIGURATION ---
        const firebaseConfig = {
            apiKey: "AIzaSyC7uuy0yYV3L17RJ0RvbN-mrfqrT4PquMo",
            authDomain: "devi-sri-delights.firebaseapp.com",
            projectId: "devi-sri-delights",
            storageBucket: "devi-sri-delights.firebasestorage.app",
            messagingSenderId: "73108349440",
            appId: "1:73108349440:web:8ca038c61c9a85b2b12ee5"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        // --- 2. DOM ELEMENTS ---
        const loginScreen = document.getElementById('login-screen');
        const dashboardScreen = document.getElementById('dashboard-screen');
        const pendingContainer = document.getElementById('pending-container');
        const readyContainer = document.getElementById('ready-container');
        const completedContainer = document.getElementById('completed-container');
        const summaryContainer = document.getElementById('item-summary-container');

        const searchBar = document.getElementById('search-bar');
        const searchWrapper = document.getElementById('search-wrapper');
        const errorMsg = document.getElementById('error-msg');

        let unsubscribeSnapshot = null; 
        window.allOrders = {};

        // --- 3. TAB SWITCHING LOGIC ---
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
                
                e.target.classList.add('active');
                const targetTab = e.target.getAttribute('data-tab');
                document.getElementById(targetTab + '-tab').classList.add('active');

                searchWrapper.style.display = (targetTab === 'summary') ? 'none' : 'block';
            });
        });

        // --- 4. AUTHENTICATION LOGIC ---
        onAuthStateChanged(auth, (user) => {
            if (user) {
                loginScreen.style.display = 'none';
                dashboardScreen.style.display = 'block';
                errorMsg.innerText = '';
                loadLiveOrders();
            } else {
                loginScreen.style.display = 'block';
                dashboardScreen.style.display = 'none';
                if(unsubscribeSnapshot) unsubscribeSnapshot();
            }
        });

        window.attemptLogin = function() {
            const email = document.getElementById('email-input').value.trim();
            const password = document.getElementById('password-input').value.trim();
            
            if (!email || !password) {
                errorMsg.innerText = "Please enter both email and password.";
                return;
            }

            errorMsg.innerText = 'Connecting to Firebase...';
            
            signInWithEmailAndPassword(auth, email, password)
                .then((userCredential) => {
                    console.log("Successfully logged in!");
                })
                .catch((error) => {
                    console.error("Login Error:", error);
                    if (error.code === 'auth/invalid-credential' || error.code === 'auth/wrong-password') {
                        errorMsg.innerText = "Incorrect email or password. Try again.";
                    } else if (error.code === 'auth/user-not-found') {
                        errorMsg.innerText = "No account found with this email.";
                    } else {
                        errorMsg.innerText = "Error: " + error.message;
                    }
                });
        };

        window.attemptLogout = function() { 
            signOut(auth); 
        };

        // --- 5. SEARCH FILTERING ---
        function filterOrders() {
            const searchTerm = searchBar.value.toLowerCase();
            const cards = document.querySelectorAll('.order-card');
            cards.forEach(card => {
                const customerName = card.querySelector('.order-header h3').innerText.toLowerCase();
                card.style.display = customerName.includes(searchTerm) ? 'flex' : 'none';
            });
        }
        searchBar.addEventListener('input', filterOrders);

        // --- 6. REAL-TIME DATABASE SYNC ---
        function loadLiveOrders() {
            const q = query(collection(db, "orders"), orderBy("timestamp", "desc"));

            unsubscribeSnapshot = onSnapshot(q, (snapshot) => {
                pendingContainer.innerHTML = ''; 
                readyContainer.innerHTML = '';
                completedContainer.innerHTML = '';
                summaryContainer.innerHTML = '';
                
                window.allOrders = {}; 
                
                let todayCount = 0;
                let todayEarnings = 0;
                let itemSummary = {};

                const startOfToday = new Date();
                startOfToday.setHours(0, 0, 0, 0);

                let pendingHtml = '';
                let readyHtml = '';
                let completedHtml = '';

                snapshot.forEach((orderDoc) => {
                    const order = orderDoc.data();
                    const orderId = orderDoc.id;
                    window.allOrders[orderId] = order;
                    
                    let orderDate = order.timestamp ? order.timestamp.toDate() : new Date();
                    let isToday = orderDate >= startOfToday;

                    if (isToday) {
                        todayCount++;
                        todayEarnings += Number(order.totalBill) || 0;
                        
                        for (let itemName in order.orderItems) {
                            itemSummary[itemName] = (itemSummary[itemName] || 0) + order.orderItems[itemName].quantity;
                        }
                    }

                    let timeString = "Just Now";
                    if(order.timestamp) {
                        timeString = orderDate.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                        if(!isToday) {
                            timeString = orderDate.toLocaleDateString() + " " + timeString;
                        }
                    }

                    let itemsHTML = '';
                    for (let itemName in order.orderItems) {
                        itemsHTML += `<li>${itemName} <strong>(x${order.orderItems[itemName].quantity})</strong></li>`;
                    }

                    let status = order.status || "Pending";
                    let cardClass = '';
                    let actionHTML = '';

                    if (status === "Pending") {
                        actionHTML = `<button class="action-btn" onclick="markReady('${orderId}')">🔥 Mark as Ready & Notify</button>`;
                    } else if (status === "Ready") {
                        cardClass = 'ready';
                        actionHTML = `<button class="action-btn pickup-btn" onclick="markPickedUp('${orderId}')">🛍️ Mark as Picked Up</button>`;
                    } else if (status === "Picked up" || status === "Completed") {
                        cardClass = 'completed';
                        actionHTML = `<div class="completed-text">✔️ Order Picked Up</div>`;
                    }

                    const cardHTML = `
                        <div class="order-card ${cardClass}">
                            <div class="order-header">
                                <h3>👤 ${order.customerName}</h3>
                                <span class="time-badge">🕒 ${timeString}</span>
                            </div>
                            <ul class="item-list">
                                ${itemsHTML}
                            </ul>
                            <div class="total-bill">Total: ₹${order.totalBill}</div>
                            ${actionHTML}
                        </div>
                    `;

                    if (status === "Pending") pendingHtml += cardHTML;
                    else if (status === "Ready") readyHtml += cardHTML;
                    else completedHtml += cardHTML;
                });
                
                pendingContainer.innerHTML = pendingHtml || '<div class="empty-state">No new orders right now.</div>';
                readyContainer.innerHTML = readyHtml || '<div class="empty-state">No orders waiting for pickup.</div>';
                completedContainer.innerHTML = completedHtml || '<div class="empty-state">No completed orders yet.</div>';

                document.getElementById('today-count').innerText = todayCount;
                document.getElementById('today-earnings').innerText = '₹' + todayEarnings;

                let summaryHTML = '';
                let hasItems = false;
                for (let item in itemSummary) {
                    hasItems = true;
                    summaryHTML += `
                        <div class="summary-item">
                            <div>${item}</div>
                            <span>x${itemSummary[item]}</span>
                        </div>`;
                }
                summaryContainer.innerHTML = hasItems ? summaryHTML : '<div class="empty-state" style="grid-column: 1/-1;">No items sold today yet.</div>';

                filterOrders();
            });
        }

        // --- 7. ORDER ACTIONS & WHATSAPP GENERATION ---
        window.markReady = async function(orderId) {
            const orderRef = doc(db, "orders", orderId);
            await updateDoc(orderRef, { status: "Ready" }); 

            const order = window.allOrders[orderId];
            if (order && order.customerPhone) {
                let cleanPhone = order.customerPhone.replace(/[^0-9]/g, ''); 
                let itemsList = '';
                for(let key in order.orderItems) {
                    itemsList += `▪️ ${key} (x${order.orderItems[key].quantity})\n`;
                }
                let msg = `🎉 *Your Order is Ready!*\n\nHello ${order.customerName},\nYour food from *Devi Sri Delights* is hot and ready for pickup!\n\n*Order Details:*\n${itemsList}\n*Total Bill:* ₹${order.totalBill}\n\nPlease collect it at the counter. See you soon! 🍽️`;
                let waUrl = `https://wa.me/${cleanPhone}?text=${encodeURIComponent(msg)}`;
                window.open(waUrl, '_blank');
            }
        };

        window.markPickedUp = async function(orderId) {
            const orderRef = doc(db, "orders", orderId);
            await updateDoc(orderRef, { status: "Picked up" }); 
        };

    </script>
</body>
</html>
